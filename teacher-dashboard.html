<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

  <div class="dashboard">

    <div class="topbar">
      <h2>👩‍🏫 Teacher Dashboard</h2>
      <button class="btn secondary" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h3>Earnings</h3>
      <p>Wallet Balance: KES 0</p>
      <p>Subscribers: 0</p>

      <button class="btn primary">
        Withdraw (coming soon)
      </button>
    </div>

    <div class="grid">

      <div class="card">
        📊 <h3>Students</h3>
        <p>Manage your learners</p>
      </div>

      <div class="card">
        📚 <h3>Subjects</h3>
        <p>Teaching areas</p>
      </div>

      <div class="card">
        💬 <h3>Clubs</h3>
        <p>Moderate debates & groups</p>
      </div>

    </div>

  </div>

</body>
</html>
