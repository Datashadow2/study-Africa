<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Study Africa - Authentication</title>

  <link rel="stylesheet" href="assets/styles.css">

  <style>
    body{
      margin:0;
      padding:20px;
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .auth-container{
      width:100%;
      max-width:650px;
      background:#1e293b;
      padding:30px;
      border-radius:18px;
      box-shadow:0 0 25px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:20px;
    }

    input,
    select,
    button{
      padding:14px;
      border:none;
      border-radius:10px;
      font-size:15px;
      width:100%;
      box-sizing:border-box;
    }

    input,
    select{
      background:white;
      color:black;
    }

    button{
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#1d4ed8;
    }

    #signupFields{
      display:none;
      flex-direction:column;
      gap:14px;
    }

    fieldset{
      border:1px solid #475569;
      border-radius:12px;
      padding:15px;
    }

    legend{
      padding:0 10px;
      color:#93c5fd;
    }

    fieldset label{
      display:block;
      margin-bottom:10px;
      color:#e2e8f0;
    }

    .bottom-text{
      margin-top:20px;
      text-align:center;
    }

    .link-btn{
      color:#60a5fa;
      cursor:pointer;
      text-decoration:underline;
    }

    #status{
      margin-top:15px;
      text-align:center;
      color:#fca5a5;
    }

    .hidden{
      display:none;
    }
  </style>
</head>

<body>

<div class="auth-container">

  <h1 id="authTitle">Welcome Back</h1>

  <p>
    Inclusive learning for every student and teacher.
  </p>

  <form id="authForm">

    <!-- SIGNUP FIELDS -->
    <div id="signupFields">

      <!-- Full Name -->
      <input
        type="text"
        id="fullName"
        placeholder="Full Name"
      >

      <!-- Role -->
      <select id="roleSelect">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>

      <!-- Religion -->
      <select id="religionSelect">
        <option value="">Select Religion</option>
        <option value="christianity">Christianity</option>
        <option value="islam">Islam</option>
        <option value="traditional">Traditional African</option>
        <option value="other">Other</option>
        <option value="none">Prefer not to say</option>
      </select>

      <!-- Disability -->
      <select id="disabilitySelect">
        <option value="">Disability Support (Optional)</option>
        <option value="none">None</option>
        <option value="visual">Visual Impairment</option>
        <option value="hearing">Hearing Impairment</option>
        <option value="dyslexia">Dyslexia</option>
        <option value="mobility">Mobility Challenges</option>
        <option value="other">Other</option>
      </select>

      <!-- Grade -->
      <select id="gradeSelect">
        <option value="">Select Grade</option>
        <option value="grade7">Grade 7</option>
        <option value="grade8">Grade 8</option>
        <option value="grade9">Grade 9</option>
        <option value="grade10">Grade 10</option>
        <option value="grade11">Grade 11</option>
        <option value="grade12">Grade 12</option>
      </select>

      <!-- Curriculum -->
      <select id="curriculumSelect">
        <option value="">Select Curriculum</option>
        <option value="cbc">CBC (Kenya)</option>
        <option value="844">8-4-4 (Kenya)</option>
        <option value="igcse">IGCSE</option>
        <option value="ib">International Baccalaureate</option>
        <option value="waec">WAEC (West Africa)</option>
        <option value="south-african">South African CAPS</option>
      </select>

      <!-- Clubs -->
      <fieldset>

        <legend>Select Clubs to Join</legend>

        <label>
          <input type="checkbox" name="clubs" value="debate">
          Debate Club
        </label>

        <label>
          <input type="checkbox" name="clubs" value="coding">
          Coding Club
        </label>

        <label>
          <input type="checkbox" name="clubs" value="science">
          Science Club
        </label>

        <label>
          <input type="checkbox" name="clubs" value="arts">
          Arts & Drama
        </label>

        <label>
          <input type="checkbox" name="clubs" value="sports">
          Sports Club
        </label>

        <label>
          <input type="checkbox" name="clubs" value="music">
          Music Club
        </label>

      </fieldset>

    </div>

    <!-- LOGIN FIELDS -->
    <input
      type="email"
      id="email"
      placeholder="Email"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit" id="submitBtn">
      Login
    </button>

  </form>

  <p id="status"></p>

  <div class="bottom-text">

    <span id="switchText">
      Don't have an account?
    </span>

    <span class="link-btn" id="switchMode">
      Sign Up
    </span>

  </div>

</div>

<script type="module" src="./supabase.js"></script>
<script type="module" src="./auth.js"></script>

</body>
</html>
