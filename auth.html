<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Africa - Authentication</title>

  <link rel="stylesheet" href="assets/styles.css" />

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .auth-container{
      width:100%;
      max-width:500px;
      background:#1e293b;
      padding:30px;
      border-radius:16px;
      box-shadow:0 0 25px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:20px;
    }

    input, select{
      padding:14px;
      border:none;
      border-radius:10px;
      font-size:15px;
    }

    button{
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#1d4ed8;
    }

    .bottom-text{
      margin-top:18px;
      text-align:center;
    }

    .link-btn{
      color:#60a5fa;
      cursor:pointer;
      text-decoration:underline;
    }

    #status{
      margin-top:10px;
      text-align:center;
      color:#fca5a5;
    }

    .hidden{
      display:none;
    }
  </style>
</head>

<body>

<div class="auth-container">

  <h1 id="authTitle">Welcome Back</h1>
  <p>Inclusive learning for every student and teacher.</p>

  <form id="authForm">

    <div id="signupFields" class="hidden">

      <input
        type="text"
        id="fullName"
        placeholder="Full Name"
      />

      <select id="roleSelect">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>

      <select id="religion">
        <option value="">Religion (Optional)</option>
        <option>Christianity</option>
        <option>Islam</option>
        <option>Hinduism</option>
        <option>Buddhism</option>
        <option>Other</option>
      </select>

      <select id="disability">
        <option value="">Disability Support (Optional)</option>
        <option>None</option>
        <option>Visual Impairment</option>
        <option>Hearing Impairment</option>
        <option>Dyslexia</option>
        <option>Mobility Challenges</option>
        <option>Other</option>
      </select>

    </div>

    <input
      type="email"
      id="email"
      placeholder="Email"
      required
    />

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    />

    <button type="submit" id="submitBtn">
      Login
    </button>

  </form>

  <p id="status"></p>

  <div class="bottom-text">
    <span id="switchText">
      Don't have an account?
    </span>

    <span class="link-btn" id="switchMode">
      Sign Up
    </span>
  </div>

</div>

<script type="module" src="./supabase.js"></script>
<script type="module" src="./auth.js"></script>

</body>
</html>
